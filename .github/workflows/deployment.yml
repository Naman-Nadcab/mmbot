name: Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: Branch to deploy
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  DEPLOY_BRANCH: ${{ github.event.inputs.deploy_branch || 'main' }}
  VPS_APP_DIR: ${{ vars.VPS_APP_DIR || '/opt/mmbot' }}
  HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || 'http://127.0.0.1/health' }}
  RESTORE_DATABASE_ON_ROLLBACK: ${{ vars.RESTORE_DATABASE_ON_ROLLBACK || 'false' }}

jobs:
  testing:
    name: Required testing gate
    uses: ./.github/workflows/testing.yml

  security:
    name: Required security gate
    uses: ./.github/workflows/security.yml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - testing
      - security
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required GitHub Secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EXCHANGE_API_KEYS: ${{ secrets.EXCHANGE_API_KEYS }}
          EXCHANGE_API_SECRETS: ${{ secrets.EXCHANGE_API_SECRETS }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          required=(VPS_HOST VPS_USER VPS_SSH_KEY DATABASE_URL REDIS_URL REDIS_PASSWORD JWT_SECRET TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID EXCHANGE_API_KEYS EXCHANGE_API_SECRETS POSTGRES_DB POSTGRES_USER POSTGRES_PASSWORD)
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub Secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Prepare SSH configuration
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${VPS_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$VPS_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Build production environment file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EXCHANGE_API_KEYS: ${{ secrets.EXCHANGE_API_KEYS }}
          EXCHANGE_API_SECRETS: ${{ secrets.EXCHANGE_API_SECRETS }}
          EXCHANGE_API_PASSPHRASES: ${{ secrets.EXCHANGE_API_PASSPHRASES }}
          EXCHANGE_API_MEMOS: ${{ secrets.EXCHANGE_API_MEMOS }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NGINX_PORT: ${{ vars.NGINX_PORT || '80' }}
          PROMETHEUS_PORT: ${{ vars.PROMETHEUS_PORT || '9090' }}
          SERVER_PORT: ${{ vars.SERVER_PORT || '8000' }}
          TRADING_MODE: ${{ vars.TRADING_MODE || 'paper' }}
          MARKET_DATA_CONNECT_ON_START: ${{ vars.MARKET_DATA_CONNECT_ON_START || 'true' }}
          MARKET_DATA_EXCHANGES: ${{ vars.MARKET_DATA_EXCHANGES || 'binance' }}
          MARKET_DATA_SYMBOLS: ${{ vars.MARKET_DATA_SYMBOLS || 'BTC/USDT' }}
          MARKET_DATA_STREAMS: ${{ vars.MARKET_DATA_STREAMS || 'orderbook,trades,ticker,kline' }}
          MARKET_DATA_PERSIST_EVERY_N_MESSAGES: ${{ vars.MARKET_DATA_PERSIST_EVERY_N_MESSAGES || '1' }}
          MARKET_MAKER_REFRESH_SECONDS: ${{ vars.MARKET_MAKER_REFRESH_SECONDS || '5' }}
          RECONCILIATION_INTERVAL_SECONDS: ${{ vars.RECONCILIATION_INTERVAL_SECONDS || '60' }}
          PAPER_STARTING_CASH: ${{ vars.PAPER_STARTING_CASH || '100000' }}
          PAPER_BASE_ASSET: ${{ vars.PAPER_BASE_ASSET || 'BTC' }}
          PAPER_QUOTE_ASSET: ${{ vars.PAPER_QUOTE_ASSET || 'USDT' }}
        run: |
          set -euo pipefail
          umask 077
          {
            printf 'APP_ENV=production\n'
            printf 'LOG_LEVEL=INFO\n'
            printf 'SERVER_IP=0.0.0.0\n'
            printf 'SERVER_PORT=%s\n' "$SERVER_PORT"
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'REDIS_URL=%s\n' "$REDIS_URL"
            printf 'REDIS_PASSWORD=%s\n' "$REDIS_PASSWORD"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'TELEGRAM_BOT_TOKEN=%s\n' "$TELEGRAM_BOT_TOKEN"
            printf 'TELEGRAM_CHAT_ID=%s\n' "$TELEGRAM_CHAT_ID"
            printf 'EXCHANGE_API_KEYS=%s\n' "$EXCHANGE_API_KEYS"
            printf 'EXCHANGE_API_SECRETS=%s\n' "$EXCHANGE_API_SECRETS"
            printf 'EXCHANGE_API_PASSPHRASES=%s\n' "${EXCHANGE_API_PASSPHRASES:-{}}"
            printf 'EXCHANGE_API_MEMOS=%s\n' "${EXCHANGE_API_MEMOS:-{}}"
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB"
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'NGINX_PORT=%s\n' "$NGINX_PORT"
            printf 'PROMETHEUS_PORT=%s\n' "$PROMETHEUS_PORT"
            printf 'TRADING_MODE=%s\n' "$TRADING_MODE"
            printf 'MARKET_DATA_CONNECT_ON_START=%s\n' "$MARKET_DATA_CONNECT_ON_START"
            printf 'MARKET_DATA_EXCHANGES=%s\n' "$MARKET_DATA_EXCHANGES"
            printf 'MARKET_DATA_SYMBOLS=%s\n' "$MARKET_DATA_SYMBOLS"
            printf 'MARKET_DATA_STREAMS=%s\n' "$MARKET_DATA_STREAMS"
            printf 'MARKET_DATA_PERSIST_EVERY_N_MESSAGES=%s\n' "$MARKET_DATA_PERSIST_EVERY_N_MESSAGES"
            printf 'MARKET_MAKER_REFRESH_SECONDS=%s\n' "$MARKET_MAKER_REFRESH_SECONDS"
            printf 'RECONCILIATION_INTERVAL_SECONDS=%s\n' "$RECONCILIATION_INTERVAL_SECONDS"
            printf 'PAPER_STARTING_CASH=%s\n' "$PAPER_STARTING_CASH"
            printf 'PAPER_BASE_ASSET=%s\n' "$PAPER_BASE_ASSET"
            printf 'PAPER_QUOTE_ASSET=%s\n' "$PAPER_QUOTE_ASSET"
          } > .env.production.remote

      - name: Copy production environment to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key -o IdentitiesOnly=yes .env.production.remote "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/.env.production.next"

      - name: Deploy on VPS
        id: deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$VPS_USER@$VPS_HOST" "APP_DIR='$VPS_APP_DIR' DEPLOY_BRANCH='$DEPLOY_BRANCH' HEALTHCHECK_URL='$HEALTHCHECK_URL' RESTORE_DATABASE_ON_ROLLBACK='$RESTORE_DATABASE_ON_ROLLBACK' bash -s" <<'REMOTE'
            set -euo pipefail
            cd "$APP_DIR"
            PREVIOUS_SHA="$(git rev-parse HEAD)"
            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            mv .env.production.next .env.production
            chmod 600 .env.production
            PREVIOUS_SHA="$PREVIOUS_SHA" SKIP_GIT_UPDATE=true APP_DIR="$APP_DIR" DEPLOY_BRANCH="$DEPLOY_BRANCH" HEALTHCHECK_URL="$HEALTHCHECK_URL" RESTORE_DATABASE_ON_ROLLBACK="$RESTORE_DATABASE_ON_ROLLBACK" scripts/deploy_vps.sh
          REMOTE

      - name: Send success notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --request POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --header 'Content-Type: application/json' \
            --data "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"Deployment succeeded for ${GITHUB_REPOSITORY} at ${GITHUB_SHA}.\"}"

      - name: Send failure and rollback notification
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --request POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --header 'Content-Type: application/json' \
            --data "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"Deployment failed for ${GITHUB_REPOSITORY} at ${GITHUB_SHA}. Automatic rollback was attempted by the VPS deployment script.\"}"
