name: Testing

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation-and-lint:
    name: Environment validation and linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt
          python -m pip install ruff

      - name: Validate environment templates
        run: |
          python scripts/validate_env.py --file .env.development --allow-template-values
          python scripts/validate_env.py --file .env.example --allow-template-values
          python scripts/validate_env.py --file .env.staging --allow-template-values
          python scripts/validate_env.py --file .env.production --allow-template-values

      - name: Lint source and tests
        run: ruff check src tests scripts --select E9,F63,F7,F82,F401,F821

      - name: Compile Python modules
        run: python -m py_compile $(find src tests scripts -name '*.py' -print)

  unit-tests:
    name: Unit and engine tests
    runs-on: ubuntu-latest
    needs: validation-and-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Run unit and engine test suites
        run: python -m pytest tests/unit tests/engines tests/execution tests/security tests/production tests/reconciliation tests/simulation

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: validation-and-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Run integration tests
        run: python -m pytest tests/integration
