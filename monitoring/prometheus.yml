global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: [backend:8000]
  - job_name: market-maker-engine
    static_configs:
      - targets: [market-maker-engine:9100]
  - job_name: market-data-engine
    static_configs:
      - targets: [market-data-engine:9100]
  - job_name: nginx
    static_configs:
      - targets: [nginx:80]
